<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEE HUNTER</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
  <header>
    <h1>BEE HUNTER</h1>
    <p>Scopri Bari giocando!</p>
  </header>

  <section id="categories">
    <div class="category" data-cat="Sea Hunter">🌊 Sea Hunter</div>
    <div class="category" data-cat="Bike & Ride">🚴 Bike & Ride</div>
    <div class="category" data-cat="Food Hunter">🍝 Food Hunter</div>
    <div class="category" data-cat="Culture Hunter">🏛️ Culture Hunter</div>
    <div class="category" data-cat="Local Services">🛍️ Local Services</div>
  </section>

  <section id="map"></section>

  <!-- Pagina dedicata esperienza -->
  <section id="experienceDetail">
    <h2 id="expName">Seleziona un'esperienza</h2>
    <p id="expCategory"></p>

    <div class="dropdown">
      <button class="dropbtn">Dettagli</button>
      <div class="dropdown-content" id="expDetails">
      </div>
    </div>

    <button id="unlockBtn">Sblocca Badge</button>
  </section>

  <section id="badges">
    <h2>Badge Sbloccati</h2>
    <ul id="badgeList"></ul>
    <p>Punti Totali: <span id="points">0</span></p>
  </section>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
